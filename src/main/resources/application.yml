# Production Configuration
# Safe to commit - uses environment variables

server:
  port: ${PORT:8080}

spring:
  # In-memory Database for Railway
  datasource:
    url: jdbc:h2:mem:coldmail_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA Settings
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false

  # H2 Console - Disabled in production
  h2:
    console:
      enabled: false

  # Mail Configuration - From environment variables
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# Logging - Minimal for production
logging:
  level:
    com.coldmail: INFO
    org.springframework: WARN
    root: WARN