server:
  port: ${PORT:8080}

spring:
  application:
    name: cold-mail-automation

  # In-memory Database
  datasource:
    url: jdbc:h2:mem:coldmail_db
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
    open-in-view: false
#    defer-datasource-initialization: true

  h2:
    console:
      enabled: false
# Resend Email Configuration
resend:
  api-key: ${RESEND_API_KEY:not-set}
  from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}
  # Mail Configuration
#  mail:
#    host: smtp.gmail.com
#    port: 587
#    username: ${MAIL_USERNAME:test@gmail.com}
#    password: ${MAIL_PASSWORD:testpass}
#    properties:
#      mail:
#        smtp:
#          auth: true
#          starttls:
#            enable: true
#          connectiontimeout: 5000
#          timeout: 5000
#          writetimeout: 5000

# Actuator - Enable health endpoint
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.coldmail: INFO