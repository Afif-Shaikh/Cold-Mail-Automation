<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Templates - Cold Mail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --sidebar-width: 250px; }
    body { min-height: 100vh; background-color: #f8f9fa; }
    .sidebar {
        position: fixed; top: 0; left: 0; height: 100vh; width: var(--sidebar-width);
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px 0; z-index: 1000;
    }
    .sidebar .brand { color: white; font-size: 1.5rem; font-weight: bold; padding: 0 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
    .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 4px 10px; border-radius: 8px; transition: all 0.3s; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.2); color: white; }
    .sidebar .nav-link i { margin-right: 10px; width: 20px; }
    .main-content { margin-left: var(--sidebar-width); padding: 30px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
    .modal-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .modal-header .btn-close { filter: invert(1); }
  </style>
</head>
<body>
<nav class="sidebar">
  <div class="brand"><i class="bi bi-envelope-paper-heart"></i> Cold Mail</div>
  <ul class="nav flex-column">
    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
    <li class="nav-item"><a class="nav-link active" href="/templates"><i class="bi bi-file-earmark-text"></i> Templates</a></li>
    <li class="nav-item"><a class="nav-link" href="/recipients"><i class="bi bi-people"></i> Recipients</a></li>
    <li class="nav-item"><a class="nav-link" href="/send"><i class="bi bi-send"></i> Send Emails</a></li>
    <li class="nav-item"><a class="nav-link" href="/logs"><i class="bi bi-journal-text"></i> Email Logs</a></li>
  </ul>
</nav>

<main class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Email Templates</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#templateModal" onclick="openAddTemplate()">
      <i class="bi bi-plus-lg me-2"></i>New Template
    </button>
  </div>

  <div class="card">
    <div class="card-body">
      <div th:if="${templates == null or templates.empty}" class="text-center text-muted py-5">
        <i class="bi bi-file-earmark-text" style="font-size: 3rem;"></i>
        <p class="mt-2">No templates yet. Create your first template!</p>
      </div>

      <div class="table-responsive" th:if="${templates != null and !templates.empty}">
        <table class="table table-hover">
          <thead>
          <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Description</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="template : ${templates}">
            <td><strong th:text="${template.name}">Name</strong></td>
            <td th:text="${template.subject}">Subject</td>
            <td th:text="${template.description} ?: '-'">Desc</td>
            <td th:text="${#temporals.format(template.createdAt, 'MMM dd, yyyy')}">Date</td>
            <td>
              <button class="btn btn-sm btn-outline-primary me-1" th:onclick="'editTemplate(' + ${template.id} + ')'">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger" th:onclick="'deleteTemplate(' + ${template.id} + ')'">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="templateModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="templateModalTitle">Add Template</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="templateId">
          <div class="mb-3">
            <label class="form-label">Template Name *</label>
            <input type="text" class="form-control" id="templateName" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Subject Line *</label>
            <input type="text" class="form-control" id="templateSubject" required>
            <small class="text-muted">Placeholders: {{NAME}}, {{COMPANY}}, {{POSITION}}</small>
          </div>
          <div class="mb-3">
            <label class="form-label">Email Body *</label>
            <textarea class="form-control" id="templateBody" rows="8" required></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <input type="text" class="form-control" id="templateDescription">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="saveTemplate()">Save</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
