<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send Emails - Cold Mail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --sidebar-width: 250px; }
    body { min-height: 100vh; background-color: #f8f9fa; }
    .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: var(--sidebar-width); background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px 0; z-index: 1000; }
    .sidebar .brand { color: white; font-size: 1.5rem; font-weight: bold; padding: 0 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
    .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 4px 10px; border-radius: 8px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.2); color: white; }
    .sidebar .nav-link i { margin-right: 10px; }
    .main-content { margin-left: var(--sidebar-width); padding: 30px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
    .modal-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .modal-header .btn-close { filter: invert(1); }
  </style>
</head>
<body>
<nav class="sidebar">
  <div class="brand"><i class="bi bi-envelope-paper-heart"></i> Cold Mail</div>
  <ul class="nav flex-column">
    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" href="/templates"><i class="bi bi-file-earmark-text"></i> Templates</a></li>
    <li class="nav-item"><a class="nav-link" href="/recipients"><i class="bi bi-people"></i> Recipients</a></li>
    <li class="nav-item"><a class="nav-link active" href="/send"><i class="bi bi-send"></i> Send Emails</a></li>
    <li class="nav-item"><a class="nav-link" href="/logs"><i class="bi bi-journal-text"></i> Email Logs</a></li>
  </ul>
</nav>

<main class="main-content">
  <h2 class="mb-4">Send Emails</h2>

  <div class="row">
    <div class="col-md-8">
      <div class="card">
        <div class="card-header bg-white">
          <h5 class="mb-0"><i class="bi bi-send me-2"></i>Compose & Send</h5>
        </div>
        <div class="card-body">
          <!-- Select Template -->
          <div class="mb-4">
            <label class="form-label fw-bold">1. Select Template *</label>
            <select class="form-select" id="selectedTemplate" onchange="loadTemplatePreview()">
              <option value="">Choose a template...</option>
              <option th:each="template : ${templates}"
                      th:value="${template.id}"
                      th:text="${template.name}"
                      th:data-subject="${template.subject}"
                      th:data-body="${template.body}">Template</option>
            </select>
          </div>

          <!-- Preview -->
          <div class="mb-4" id="templatePreviewSection" style="display: none;">
            <label class="form-label fw-bold">Preview</label>
            <div class="border rounded p-3 bg-light">
              <p><strong>Subject:</strong> <span id="previewSubjectLine"></span></p>
              <hr>
              <div id="previewBodyContent"></div>
            </div>
          </div>

          <!-- Select Recipients -->
          <div class="mb-4">
            <label class="form-label fw-bold">2. Select Recipients *</label>
            <div class="form-check mb-2">
              <input class="form-check-input" type="radio" name="recipientType" id="allPending" value="pending" checked onchange="toggleRecipientSelection()">
              <label class="form-check-label" for="allPending">
                All Pending Recipients <span class="badge bg-warning text-dark" th:text="${#lists.size(recipients)}">0</span>
              </label>
            </div>
            <div class="form-check">
              <input class="form-check-input" type="radio" name="recipientType" id="selectSpecific" value="specific" onchange="toggleRecipientSelection()">
              <label class="form-check-label" for="selectSpecific">Select Specific</label>
            </div>

            <div id="recipientCheckboxes" class="mt-3" style="display: none;">
              <div class="border rounded p-3" style="max-height: 200px; overflow-y: auto;">
                <div th:each="r : ${allRecipients}" class="form-check">
                  <input class="form-check-input recipient-checkbox" type="checkbox" th:value="${r.id}" th:id="'r_' + ${r.id}">
                  <label class="form-check-label" th:for="'r_' + ${r.id}">
                    <span th:text="${r.email}">email</span>
                    <small class="text-muted" th:text="' - ' + (${r.company} ?: '')"></small>
                  </label>
                </div>
              </div>
            </div>
          </div>

          <!-- Resume Attachment -->
          <div class="mb-4">
            <label class="form-label fw-bold">3. Attach Resume</label>
            <div class="form-check mb-2">
              <input class="form-check-input" type="checkbox" id="attachResume" checked>
              <label class="form-check-label" for="attachResume">
                Attach resume to emails
              </label>
            </div>

            <div id="resumeSelection" class="ms-4">
              <div th:if="${resumes == null or resumes.empty}" class="text-muted">
                <i class="bi bi-exclamation-circle me-1"></i>
                No resume uploaded.
                <button class="btn btn-sm btn-outline-primary ms-2" data-bs-toggle="modal" data-bs-target="#uploadResumeModal">
                  <i class="bi bi-upload me-1"></i>Upload Resume
                </button>
              </div>

              <div th:if="${resumes != null and !resumes.empty}">
                <select class="form-select form-select-sm" id="selectedResume" style="max-width: 300px;">
                  <option th:each="resume : ${resumes}"
                          th:value="${resume.id}"
                          th:text="${resume.originalFileName}"
                          th:selected="${resume.isDefault}">Resume</option>
                </select>
                <button class="btn btn-sm btn-outline-primary mt-2" data-bs-toggle="modal" data-bs-target="#uploadResumeModal">
                  <i class="bi bi-upload me-1"></i>Upload New
                </button>
              </div>
            </div>
          </div>

          <button type="button" class="btn btn-primary btn-lg w-100" onclick="sendEmails()">
            <i class="bi bi-send me-2"></i>Send Emails
          </button>
        </div>
      </div>
    </div>

    <!-- Sidebar Stats -->
    <div class="col-md-4">
      <div class="card mb-3">
        <div class="card-body text-center">
          <i class="bi bi-hourglass-split text-warning" style="font-size: 2rem;"></i>
          <h3 th:text="${#lists.size(recipients)}">0</h3>
          <p class="text-muted mb-0">Pending</p>
        </div>
      </div>
      <div class="card mb-3">
        <div class="card-body text-center">
          <i class="bi bi-file-text text-primary" style="font-size: 2rem;"></i>
          <h3 th:text="${#lists.size(templates)}">0</h3>
          <p class="text-muted mb-0">Templates</p>
        </div>
      </div>
      <div class="card">
        <div class="card-body text-center">
          <i class="bi bi-paperclip text-success" style="font-size: 2rem;"></i>
          <h3 th:text="${resumes != null} ? ${#lists.size(resumes)} : 0">0</h3>
          <p class="text-muted mb-0">Resumes</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Upload Resume Modal -->
  <div class="modal fade" id="uploadResumeModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-upload me-2"></i>Upload Resume</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Select File (PDF or Word) *</label>
            <input type="file" class="form-control" id="resumeFile" accept=".pdf,.doc,.docx" required>
            <small class="text-muted">Max file size: 5MB</small>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="uploadResume()">
            <i class="bi bi-upload me-2"></i>Upload
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Result Modal -->
  <div class="modal fade" id="resultModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Results</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="resultModalBody"></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-primary" onclick="location.reload()">OK</button>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
<script>
  // Upload Resume
  async function uploadResume() {
      const fileInput = document.getElementById('resumeFile');
      const file = fileInput.files[0];

      if (!file) {
          alert('Please select a file');
          return;
      }

      const formData = new FormData();
      formData.append('file', file);

      try {
          const response = await fetch('/api/resumes/upload', {
              method: 'POST',
              body: formData
          });

          const result = await response.json();

          if (result.success) {
              alert('Resume uploaded successfully!');
              location.reload();
          } else {
              alert('Error: ' + result.message);
          }
      } catch (error) {
          alert('Error uploading resume: ' + error.message);
      }
  }

  // Updated sendEmails function
  async function sendEmails() {
      const templateId = document.getElementById('selectedTemplate').value;
      if (!templateId) {
          alert('Please select a template');
          return;
      }

      const sendToPending = document.getElementById('allPending').checked;
      let recipientIds = [];

      if (!sendToPending) {
          const checkboxes = document.querySelectorAll('.recipient-checkbox:checked');
          recipientIds = Array.from(checkboxes).map(cb => parseInt(cb.value));

          if (recipientIds.length === 0) {
              alert('Please select at least one recipient');
              return;
          }
      }

      const attachResume = document.getElementById('attachResume').checked;
      const resumeSelect = document.getElementById('selectedResume');
      const resumeId = attachResume && resumeSelect ? parseInt(resumeSelect.value) : null;

      if (!confirm(`Are you sure you want to send emails?`)) return;

      try {
          const response = await fetch('/api/emails/send', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                  templateId: parseInt(templateId),
                  recipientIds: sendToPending ? [] : recipientIds,
                  resumeId: resumeId,
                  attachResume: attachResume
              })
          });

          const result = await response.json();

          if (result.success) {
              const logs = result.data;
              const successCount = logs.filter(l => l.status === 'SUCCESS').length;
              const failedCount = logs.filter(l => l.status === 'FAILED').length;

              document.getElementById('resultModalBody').innerHTML = `
                  <div class="text-center">
                      <i class="bi bi-check-circle text-success" style="font-size: 3rem;"></i>
                      <h4 class="mt-3">Emails Processed!</h4>
                      <p class="mb-0">
                          <span class="badge bg-success me-2">${successCount} Sent</span>
                          <span class="badge bg-danger">${failedCount} Failed</span>
                      </p>
                      ${attachResume && resumeId ? '<p class="mt-2 text-muted"><i class="bi bi-paperclip"></i> Resume attached</p>' : ''}
                  </div>
              `;
          } else {
              document.getElementById('resultModalBody').innerHTML = `
                  <div class="text-center text-danger">
                      <i class="bi bi-x-circle" style="font-size: 3rem;"></i>
                      <h4 class="mt-3">Error</h4>
                      <p>${result.message}</p>
                  </div>
              `;
          }

          new bootstrap.Modal(document.getElementById('resultModal')).show();
      } catch (error) {
          alert('Error sending emails: ' + error.message);
      }
  }
</script>
</body>
</html>
