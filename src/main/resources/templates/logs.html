<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Logs - Cold Mail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root { --sidebar-width: 250px; }
    body { min-height: 100vh; background-color: #f8f9fa; }
    .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: var(--sidebar-width); background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px 0; z-index: 1000; }
    .sidebar .brand { color: white; font-size: 1.5rem; font-weight: bold; padding: 0 20px 30px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; }
    .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 4px 10px; border-radius: 8px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.2); color: white; }
    .sidebar .nav-link i { margin-right: 10px; }
    .main-content { margin-left: var(--sidebar-width); padding: 30px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; }
  </style>
</head>
<body>
<nav class="sidebar">
  <div class="brand"><i class="bi bi-envelope-paper-heart"></i> Cold Mail</div>
  <ul class="nav flex-column">
    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
    <li class="nav-item"><a class="nav-link" href="/templates"><i class="bi bi-file-earmark-text"></i> Templates</a></li>
    <li class="nav-item"><a class="nav-link" href="/recipients"><i class="bi bi-people"></i> Recipients</a></li>
    <li class="nav-item"><a class="nav-link" href="/send"><i class="bi bi-send"></i> Send Emails</a></li>
    <li class="nav-item"><a class="nav-link active" href="/logs"><i class="bi bi-journal-text"></i> Email Logs</a></li>
  </ul>
</nav>

<main class="main-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Email Logs</h2>
    <div>
      <span class="badge bg-secondary me-3" th:text="'Total: ' + ${#lists.size(logs)}">0</span>
      <button class="btn btn-warning" onclick="retryAllFailed()" id="retryAllBtn" style="display: none;">
        <i class="bi bi-arrow-repeat me-2"></i>Retry All Failed
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div th:if="${logs == null or logs.empty}" class="text-center text-muted py-5">
        <i class="bi bi-journal-text" style="font-size: 3rem;"></i>
        <p class="mt-2">No emails sent yet. <a href="/send">Send your first email!</a></p>
      </div>

      <div class="table-responsive" th:if="${logs != null and !logs.empty}">
        <table class="table table-hover">
          <thead>
          <tr>
            <th>#</th>
            <th>Recipient</th>
            <th>Subject</th>
            <th>Status</th>
            <th>Sent At</th>
            <th>Actions</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="log, i : ${logs}" th:classappend="${log.status.name() == 'FAILED'} ? 'table-danger' : ''">
            <td th:text="${i.count}">1</td>
            <td>
              <strong th:text="${log.recipient.name} ?: 'N/A'">Name</strong><br>
              <small class="text-muted" th:text="${log.recipient.email}">email</small>
            </td>
            <td>
              <span th:text="${#strings.abbreviate(log.subject, 40)}">Subject</span>
            </td>
            <td>
                                    <span class="badge bg-success" th:if="${log.status.name() == 'SUCCESS'}">
                                        <i class="bi bi-check-circle me-1"></i>SUCCESS
                                    </span>
              <span class="badge bg-danger" th:if="${log.status.name() == 'FAILED'}">
                                        <i class="bi bi-x-circle me-1"></i>FAILED
                                    </span>
              <small th:if="${log.status.name() == 'FAILED' and log.errorMessage != null}"
                     class="d-block text-danger mt-1"
                     th:text="${#strings.abbreviate(log.errorMessage, 50)}"></small>
            </td>
            <td th:text="${#temporals.format(log.sentAt, 'MMM dd, yyyy HH:mm')}">Date</td>
            <td>
              <!-- Use data attributes instead of onclick with strings -->
              <button class="btn btn-sm btn-outline-info view-details-btn"
                      th:data-id="${log.id}"
                      th:data-subject="${log.subject}"
                      th:data-body="${log.body}">
                <i class="bi bi-eye"></i>
              </button>
              <button th:if="${log.status.name() == 'FAILED'}"
                      class="btn btn-sm btn-warning retry-btn"
                      th:data-id="${log.id}">
                <i class="bi bi-arrow-repeat"></i> Retry
              </button>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Email Details Modal -->
  <div class="modal fade" id="emailDetailsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Email Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p><strong>Subject:</strong> <span id="detailSubject"></span></p>
          <hr>
          <div id="detailBody"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Check if there are failed emails and show retry all button
  document.addEventListener('DOMContentLoaded', function() {
      const failedBadges = document.querySelectorAll('.badge.bg-danger');
      if (failedBadges.length > 0) {
          document.getElementById('retryAllBtn').style.display = 'inline-block';
      }

      // Attach click handlers for view details buttons
      document.querySelectorAll('.view-details-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
              const subject = this.getAttribute('data-subject');
              const body = this.getAttribute('data-body');
              viewEmailDetails(subject, body);
          });
      });

      // Attach click handlers for retry buttons
      document.querySelectorAll('.retry-btn').forEach(function(btn) {
          btn.addEventListener('click', function() {
              const logId = this.getAttribute('data-id');
              retryEmail(logId);
          });
      });
  });

  // View email details
  function viewEmailDetails(subject, body) {
      document.getElementById('detailSubject').textContent = subject || '';
      document.getElementById('detailBody').innerHTML = body || '';
      new bootstrap.Modal(document.getElementById('emailDetailsModal')).show();
  }

  // Retry single email
  async function retryEmail(logId) {
      if (!confirm('Retry sending this email?')) return;

      try {
          const response = await fetch('/api/emails/retry/' + logId, {
              method: 'POST'
          });

          const result = await response.json();

          if (result.success) {
              alert(result.data.status === 'SUCCESS' ? 'Email sent successfully!' : 'Email still failed. Check logs.');
              location.reload();
          } else {
              alert('Error: ' + result.message);
          }
      } catch (error) {
          alert('Error: ' + error.message);
      }
  }

  // Retry all failed emails
  async function retryAllFailed() {
      if (!confirm('Retry all failed emails?')) return;

      try {
          const response = await fetch('/api/emails/retry-all', {
              method: 'POST'
          });

          const result = await response.json();

          if (result.success) {
              const data = result.data;
              alert('Retry complete!\nSuccess: ' + data.success + '\nFailed: ' + data.failed);
              location.reload();
          } else {
              alert('Error: ' + result.message);
          }
      } catch (error) {
          alert('Error: ' + error.message);
      }
  }
</script>
</body>
</html>
